
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: NEON-GEAR | Syndicate-Prime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #020202; font-family: 'JetBrains Mono', monospace; }
        .neon-panel { 
            background: rgba(0, 20, 30, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.1), 0 0 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        .stat-bar {
            height: 4px;
            background: rgba(0, 242, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .stat-bar-fill {
            position: absolute;
            height: 100%;
            background: #00f2ff;
            box-shadow: 0 0 10px #00f2ff;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Character Creator -->
    <div id="creator-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4">
        <div class="neon-panel w-full max-w-4xl p-8 rounded-lg">
            <div class="flex flex-col md:flex-row gap-12">
                <div class="flex-1 space-y-6">
                    <h2 class="text-4xl font-bold font-['Orbitron'] text-cyan-400 italic tracking-tighter">NEON_GEAR</h2>
                    <div class="space-y-4">
                        <input id="char-name" type="text" placeholder="ID_IDENTIFIER" class="w-full bg-cyan-900/20 border border-cyan-500/50 p-4 text-cyan-400 outline-none">
                        <select id="char-race" class="w-full bg-cyan-900/20 border border-cyan-500/50 p-4 text-cyan-400 outline-none">
                            <option value="HUMAN">BIO_UNIT: HUMAN</option>
                            <option value="ANDROID">SYNTH_UNIT: ANDROID</option>
                            <option value="CYBORG">AUG_UNIT: CYBORG</option>
                        </select>
                        <input id="char-color" type="color" value="#00f2ff" class="w-full h-12 border-none bg-transparent">
                    </div>
                </div>
                <div class="flex-1 space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="text-cyan-600 text-xs">ALLOCATION_POINTS</span>
                        <span id="stat-points" class="text-2xl font-bold text-cyan-400">20</span>
                    </div>
                    <div id="stat-container" class="space-y-6"></div>
                    <button id="start-btn" class="w-full py-4 bg-cyan-500 text-black font-bold font-['Orbitron'] hover:bg-white transition-colors">BOOT_SEQUENCE()</button>
                </div>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div id="ui-layer" class="hidden fixed inset-0 pointer-events-none p-6 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="neon-panel p-4 w-64 pointer-events-auto">
                <div id="hud-name" class="text-cyan-400 font-bold font-['Orbitron']">---</div>
                <div class="stat-bar mt-2"><div class="stat-bar-fill" style="width: 100%"></div></div>
                <div class="flex justify-between mt-1">
                    <span class="text-[8px] text-cyan-700">HP_STABILITY</span>
                    <span class="text-[8px] text-cyan-700">100%</span>
                </div>
            </div>
            <div class="neon-panel p-2 pointer-events-auto">
                <div id="coords" class="text-cyan-500 text-[10px]">LOC: 0.0</div>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
